name: Despliegue Continuo Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Generar ZIP del Backend
        run: |
          cd Backend
          zip -r ../deploy.zip ./*
          cd ..

      - name: Enviar y Desplegar en AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
          application_name: 'DespliegueContinuo_Modelado' 
          environment_name: 'DespliegueContinuoModelado-env' 
          
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: deploy.zip